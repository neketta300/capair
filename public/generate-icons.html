<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Generator</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      background: #2C3E50;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    button:hover {
      background: #1a2830;
    }
    .status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
      background: #f0f0f0;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PWA Icon Generator</h1>
    <p>Click the button to generate PNG icons from SVG</p>
    <button onclick="generateIcons()">Generate Icons</button>
    <div id="status"></div>
  </div>

  <script>
    async function generateIcons() {
      const status = document.getElementById('status');
      status.className = 'status';
      status.textContent = 'Generating icons...';

      try {
        const svgText = await fetch('/icons/icon-192.svg').then(r => r.text());
        const svgBlob = new Blob([svgText], { type: 'image/svg+xml' });
        const svgUrl = URL.createObjectURL(svgBlob);

        const sizes = [
          { name: 'icon-192.png', size: 192 },
          { name: 'icon-512.png', size: 512 },
          { name: 'icon-maskable-192.png', size: 192 },
          { name: 'icon-maskable-512.png', size: 512 },
        ];

        for (const { name, size } of sizes) {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');

          await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              ctx.drawImage(img, 0, 0, size, size);
              resolve();
            };
            img.src = svgUrl;
          });

          const pngBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
          
          // Create download link
          const a = document.createElement('a');
          a.href = URL.createObjectURL(pngBlob);
          a.download = name;
          a.click();
          URL.revokeObjectURL(a.href);

          await new Promise(r => setTimeout(r, 100));
        }

        URL.revokeObjectURL(svgUrl);
        status.className = 'status success';
        status.textContent = 'Icons generated successfully! Check your downloads.';
      } catch (error) {
        status.className = 'status error';
        status.textContent = 'Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
